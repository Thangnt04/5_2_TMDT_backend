services:
  mariadb:
    image: mysql:8.0
    container_name: mariadb_container
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=webquanao
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "-uroot", "-p123456", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s

  webquanao:
    build:
      context: ./webquanao
      dockerfile: Dockerfile
    container_name: webquanao
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./webquanao:/var/www/html
    environment:
      - MYSQL_HOST=mariadb
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DATABASE=webquanao
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8080/dang-nhap/google/callback}
      - OPENROUTE_SERVICE=${OPENROUTE_SERVICE:-}



  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    environment:
      - PMA_HOST=mariadb
      - MYSQL_ROOT_PASSWORD=123456
    ports:
      - "8081:80"

volumes:
  mariadb_data: